<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <title>Poster Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="viewer-page">
    <div id="viewerChrome" class="viewer-chrome">
      <a class="viewer-back" href="./index.html">一覧</a>
      <div class="viewer-title" id="viewerTitle">読み込み中</div>
      <button id="safariFixButton" class="viewer-button" type="button">Safari補正</button>
      <button id="directButton" class="viewer-button" type="button">直接表示</button>
      <button id="fullscreenButton" class="viewer-button" type="button">全画面</button>
    </div>
    <div id="viewerMessage" class="viewer-message">ポスターを準備しています。</div>
    <iframe
      id="posterFrame"
      class="poster-frame"
      title="HTML poster"
      allow="fullscreen; autoplay"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads"
      hidden
    ></iframe>

    <script type="module" src="./viewer.js"></script>
  </body>
</html>
