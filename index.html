<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ef">
    <title>HTML Poster Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mobile local viewer</p>
          <h1>HTML Poster Viewer</h1>
        </div>
        <label class="primary-action">
          <span>ZIP追加</span>
          <input id="zipInput" type="file" accept=".zip,application/zip,application/x-zip-compressed" hidden>
        </label>
      </header>

      <section class="status-panel" aria-live="polite">
        <div>
          <strong id="statusTitle">準備できました</strong>
          <p id="statusText">HTMLポスター一式をZIPにして取り込むと、この端末内に保存されます。</p>
        </div>
        <button id="refreshButton" class="ghost-button" type="button">更新</button>
      </section>

      <section id="entryChooser" class="dialog-panel" hidden>
        <div>
          <h2>起動HTMLを選択</h2>
          <p>ZIP内に複数のHTMLが見つかりました。最初に開くファイルを選んでください。</p>
        </div>
        <div id="entryOptions" class="entry-options"></div>
      </section>

      <section>
        <div class="section-heading">
          <h2>保存済みポスター</h2>
          <span id="posterCount">0件</span>
        </div>
        <div id="posterList" class="poster-grid"></div>
        <div id="emptyState" class="empty-state">
          <h2>まだポスターがありません</h2>
          <p>SoziやAI生成HTMLのフォルダ一式をZIP化して追加してください。</p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
